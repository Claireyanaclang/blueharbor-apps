<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Harbor Enterprise</title>
<style>
  :root{ --navy-950:#0a1428; --navy-900:#0f1e3a; --gold-500:#c9a24a; --gold-600:#a9822f; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 12% -10%, #1c3868 0%, transparent 60%),
      radial-gradient(1000px 600px at 110% 110%, #16264d 0%, transparent 60%), var(--navy-950);
    color:#fff;}
  .wrap{text-align:center;max-width:640px;padding:24px;}
  .brand{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#8ea0c7;margin-bottom:8px;}
  h1{font-size:32px;margin:0 0 34px;}
  .cards{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;}
  a.card{display:block;width:220px;background:#0f1e3a;border:1px solid rgba(201,162,74,.3);border-radius:16px;
    padding:28px 20px;color:#fff;text-decoration:none;transition:.15s;}
  a.card:hover{border-color:var(--gold-500);transform:translateY(-3px);}
  .card .logo{width:44px;height:44px;border-radius:12px;margin:0 auto 14px;
    background:linear-gradient(135deg, var(--gold-500), var(--gold-600));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--navy-950);}
  .card .name{font-weight:700;font-size:16px;}
  .card .sub{color:#8ea0c7;font-size:12.5px;margin-top:4px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Blue Harbor Enterprise</div>
    <h1>Choose an app</h1>
    <div class="cards">
      <a class="card" href="/proptrack">
        <div class="logo">PT</div>
        <div class="name">PropTrack</div>
        <div class="sub">Property Manager</div>
      </a>
      <a class="card" href="/biztrack">
        <div class="logo">BT</div>
        <div class="name">BizTrack</div>
        <div class="sub">Business Manager</div>
      </a>
    </div>
  </div>
</body>
</html>
